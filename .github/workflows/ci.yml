name: CI

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]          # trigger packaging on version tags
  pull_request:
    branches: [ main ]
  workflow_dispatch:             # allow manual runs to test secrets / packaging

# Cancel in-progress runs on the same branch/PR when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Windows ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (WinUI 3)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # Windows App SDK runtime is only needed to RUN the app, not to build it.
      # The NuGet packages (Microsoft.WindowsAppSDK etc.) are restored by
      # MSBuild /restore and supply all build-time headers and libs.

      - name: Build (native libs + frontend)
        shell: pwsh
        run: scripts\build-windows.ps1 -Config Release

      - name: Run tests
        shell: pwsh
        run: |
          cmake -B build -DEWCALC_BUILD_TESTS=ON
          cmake --build build --config Release
          ctest --test-dir build --build-config Release --output-on-failure

      # MSIX packaging deferred: requires Package.appxmanifest, logo assets,
      # and a valid Publisher certificate. Address when preparing for distribution.

  # ── macOS ───────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (SwiftUI) — Phase 4
    runs-on: macos-14           # Apple Silicon runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      # Import the cert and notarytool credentials BEFORE the build so the
      # frontend is compiled and signed with the real Developer ID identity
      # (including --timestamp) in a single build pass.
      - name: Import signing certificate
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          MACOS_CERTIFICATE:     ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID:              ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:         ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PWD: ${{ secrets.APPLE_APP_SPECIFIC_PWD }}
        run: |
          KEYCHAIN=$RUNNER_TEMP/ewcalc-signing.keychain-db
          security create-keychain -p "" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "" $KEYCHAIN
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -P "$MACOS_CERTIFICATE_PWD" \
              -A -t cert -f pkcs12 -k $KEYCHAIN
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN
          security list-keychain -d user -s $KEYCHAIN $(security list-keychains -d user | tr -d '"')
          rm /tmp/cert.p12
          xcrun notarytool store-credentials ewcalc-notarytool \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PWD"

      - name: Build, sign, notarize and package (release)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: bash scripts/build-macos.sh --config Release --package

      - name: Build (CI)
        if: "!(startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')"
        run: bash scripts/build-macos.sh --config Release

      - name: Run tests
        run: |
          cmake -B build -DEWCALC_BUILD_TESTS=ON
          cmake --build build --config Release --parallel
          ctest --test-dir build --build-config Release --output-on-failure

      - name: Upload DMG
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ewcalc-macos-dmg
          path: build/pkg/*.dmg
          retention-days: 90

  # ── Linux ───────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (Qt6) — Phase 5
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            qt6-base-dev libgl-dev

      - name: Build (native libs + frontend)
        run: bash scripts/build-linux.sh --config Release

      - name: Run tests
        run: |
          cmake -B build -DEWCALC_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

      - name: Package AppImage
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Install linuxdeploy + Qt plugin (both required for Qt AppImages)
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy
          mv linuxdeploy-plugin-qt-x86_64.AppImage /usr/local/bin/linuxdeploy-plugin-qt
          bash scripts/build-linux.sh --config Release --package appimage

      - name: Upload AppImage
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ewcalc-linux-appimage
          path: build/pkg/*.AppImage
          retention-days: 90

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [ build-windows, build-macos, build-linux ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ewcalc ${{ github.ref_name }}
          draft: true             # review before publishing
          generate_release_notes: true
          files: |
            artifacts/**/*.msix
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
